<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- v20260330-1 -->
<title>旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
  /* 入力欄以外でiOSの長押しメニュー（コピー・選択・貼り付け）を無効化 */
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}
/* テキスト入力欄は選択・コピー・貼り付けを許可 */
input,textarea{
  -webkit-touch-callout:default;
  -webkit-user-select:text;
  user-select:text;
}
html,body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#F5C842;
  min-height:100vh;
  touch-action:pan-y;
  overscroll-behavior-y:none;
}
/* プルトゥリフレッシュ表示 */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;
  background:rgba(46,125,120,.9);
  color:#fff;font-size:13px;font-weight:700;
  font-family:'M PLUS Rounded 1c',sans-serif;
  transition:height .18s ease;pointer-events:none;
}
#ptr-indicator.pulling{height:44px;}
#ptr-indicator.ready{height:44px;background:#2E7D78;}

/* 背景ドットパターン */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(0,0,0,.07) 1.5px,transparent 1.5px);
  background-size:20px 20px;
  pointer-events:none;
  z-index:0;
}

.app{max-width:100%;margin:0 auto;padding:0 0 120px;position:relative;z-index:1}

/* ── ヘッダー ── */
.app-head{
  background:linear-gradient(150deg,#1d6e6a 0%,#2E7D78 55%,#1a5c58 100%);
  padding:14px 14px 16px;
  border-radius:0 0 26px 26px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(20,80,76,.35),0 1px 0 rgba(255,255,255,.08) inset;
  overflow:hidden;
  /* transitions for compact mode */
  transition:padding .28s cubic-bezier(.4,0,.2,1),border-radius .25s ease;
}

/* ── コンパクトモード（スクロール後） ── */
.app-head.compact{padding:6px 14px 8px;border-radius:0 0 18px 18px}

.collapsible{
  overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1), opacity .22s ease, margin .22s ease;
}
.trip-name-row.collapsible{max-height:60px;opacity:1;margin-bottom:10px}
.app-head.compact .trip-name-row.collapsible{max-height:0;opacity:0;margin-bottom:0}

.date-label-wrap.collapsible{max-height:24px;opacity:1}
.app-head.compact .date-label-wrap.collapsible{max-height:0;opacity:0}

.date-dots-wrap.collapsible{max-height:30px;opacity:1;margin-top:8px}
.app-head.compact .date-dots-wrap.collapsible{max-height:0;opacity:0;margin-top:0}

/* 旅行名 */
.trip-name-row{display:flex;align-items:center;justify-content:center}
.trip-name{
  font-size:17px;font-weight:900;
  color:#F5C842;
  background:transparent;border:none;outline:none;
  text-align:center;
  font-family:'M PLUS Rounded 1c',sans-serif;
  width:220px;
  letter-spacing:.04em;
  text-shadow:0 2px 6px rgba(0,0,0,.18);
}
.trip-name::placeholder{color:rgba(245,200,66,.4)}

/* 日付ナビ行 */
.date-nav{display:flex;align-items:center;gap:4px}
.nav-btn{
  width:38px;height:38px;
  border:none;background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.88);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:background .15s,transform .1s;
  touch-action:manipulation;flex-shrink:0;
}
.nav-btn:active{background:rgba(255,255,255,.22);transform:scale(.9)}

.date-center{flex:1;text-align:center;min-width:0}
.date-display{font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.day-label{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;font-family:'M PLUS Rounded 1c',sans-serif}

/* 削除モード */
.ev-wrap.jiggle .ev-card{
  background:#fff0f0;
  outline:2px solid rgba(255,59,48,.35);
  outline-offset:1px;
}
@keyframes del-pulse{0%,100%{opacity:1}50%{opacity:.7}}
.ev-wrap.jiggle .ev-del-btn{animation:del-pulse 1.2s ease-in-out infinite}

/* 削除ボタン：list-toggleと同位置、jiggle時に差し替え */
.ev-del-btn{
  width:26px;height:26px;border-radius:50%;border:none;
  background:#ff3b30;color:#fff;
  font-size:15px;font-weight:900;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
  box-shadow:0 2px 6px rgba(255,59,48,.45);
}
.ev-del-btn:active{background:#c0392b;transform:scale(.92)}

/* ── イベント追加ボタン（コネクター長押しで出現） ── */
.conn-add-btn{
  width:30px;height:30px;border-radius:50%;
  background:#3b82f6;color:#fff;
  border:none;font-size:18px;font-weight:900;line-height:1;
  display:none;align-items:center;justify-content:center;
  cursor:grab;flex-shrink:0;
  box-shadow:0 3px 10px rgba(59,130,246,.5);
  touch-action:none;user-select:none;
  transition:transform .12s;
}
.conn-add-btn.visible{display:flex}
.conn-add-btn:active{transform:scale(.9)}

/* ドロップターゲット（イベント上下） */
.ev-wrap.add-target-above::before,
.ev-wrap.add-target-below::after{
  content:'イベントを追加';
  display:block;
  background:#3b82f6;color:#fff;
  font-size:11px;font-weight:700;
  font-family:'M PLUS Rounded 1c',sans-serif;
  text-align:center;padding:6px 0;
  border-radius:10px;margin:2px 0;
}
.ev-wrap.add-target-above::before{margin-bottom:4px}
.ev-wrap.add-target-below::after{margin-top:4px}

/* ドット行 */
.date-dots-wrap{display:flex;justify-content:center}
.date-dots{display:flex;justify-content:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.28);transition:all .2s;cursor:pointer}
.dot.active{background:#F5C842;transform:scale(1.5);box-shadow:0 0 0 3px rgba(245,200,66,.22)}
.dot.has-event{background:rgba(255,255,255,.6)}

/* 日程追加ボタン */
.add-day-wrap{display:flex;justify-content:center}
.add-day-row{display:flex;align-items:center;gap:8px;width:100%;justify-content:center}
.add-day-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,.22);
  border-radius:20px;padding:4px 16px;
  font-size:11px;color:rgba(255,255,255,.62);
  cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;
  touch-action:manipulation;
}
.add-day-btn:active{background:rgba(255,255,255,.1)}
.del-day-btn{
  position:fixed;top:10px;right:10px;z-index:300;
  background:rgba(192,57,43,.15);
  border:1px solid rgba(192,57,43,.35);
  border-radius:16px;padding:5px 12px;
  font-size:11px;font-weight:700;color:rgba(200,80,60,.9);
  cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;
  touch-action:manipulation;white-space:nowrap;
  opacity:1;pointer-events:auto;
  transition:opacity .25s ease;
}
.del-day-btn.hidden{opacity:0;pointer-events:none}
.del-day-btn:active{background:rgba(192,57,43,.28)}

/* スワイプヒント */
.swipe-create-hint{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  background:#2E7D78;color:#fff;
  padding:10px 14px;border-radius:14px 0 0 14px;
  font-size:12px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .18s;white-space:nowrap;
}
.swipe-create-hint.show{opacity:1}
.swipe-prev-hint{
  position:fixed;left:0;top:50%;transform:translateY(-50%);
  background:#2E7D78;color:#fff;
  padding:10px 14px;border-radius:0 14px 14px 0;
  font-size:12px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .18s;white-space:nowrap;
}
.swipe-prev-hint.show{opacity:1}

/* ── スライドコンテナ ── */
.slide-viewport{width:100%;position:relative;overflow:hidden}
.slide-track{
  display:flex;width:300%;
  will-change:transform;
}
.slide-pane{width:33.333%;flex-shrink:0;min-height:200px}

/* 新日程作成オーバーレイ */
.create-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;
  pointer-events:none;opacity:0;transition:opacity .15s;
}
.create-overlay .co-icon{font-size:36px;font-family:'M PLUS Rounded 1c',sans-serif;color:#2E7D78;font-weight:900}
.create-overlay .co-label{font-size:15px;font-weight:700;color:#2E7D78;font-family:'M PLUS Rounded 1c',sans-serif;background:rgba(245,200,66,.85);padding:6px 18px;border-radius:20px}

/* ── タイムライン ── */
.timeline-area{padding:12px 12px 4px;width:100%}
.empty-hint{text-align:center;padding:48px 20px;color:#7a6010;font-size:14px;font-family:'M PLUS Rounded 1c',sans-serif;line-height:1.8}
.empty-hint .big{font-size:36px;margin-bottom:10px;letter-spacing:-.02em;color:#b08800;font-weight:900}

/* ドロップゾーン */
.drop-zone{height:4px;border-radius:4px;transition:all .15s;margin:0 52px}
.drop-zone.over{height:30px;background:rgba(59,130,246,.15);margin:2px 52px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px dashed rgba(59,130,246,.5)}
.drop-zone.over::after{content:'イベントを追加';font-size:11px;color:#3b82f6;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif}

/* ── イベント ── */
.ev-wrap{position:relative}
.ev-wrap.dragging{opacity:.32}
.ev-row{display:flex;align-items:flex-start}
.ev-left{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;padding-right:8px;padding-top:8px}
.ev-time{
  font-size:15px;font-weight:700;
  color:#1a5c58;
  cursor:pointer;
  padding:3px 5px;border-radius:6px;
  line-height:1;white-space:nowrap;
  transition:background .15s;
  font-family:'M PLUS Rounded 1c',sans-serif;
  text-shadow:0 1px 0 rgba(255,255,255,.55);
}
.ev-time:active{background:rgba(255,255,255,.65)}
.ev-time.fixed{color:#c0392b;background:rgba(192,57,43,.12);text-shadow:none}
.ev-right{flex:1;min-width:0;overflow:visible}

/* ── 雲形カード ── */
.ev-card{
  background:#fff;
  /* Base cloud shape */
  border-radius:26px 30px 24px 28px / 28px 26px 30px 24px;
  padding:6px 8px 6px 6px;
  display:flex;align-items:center;gap:6px;min-height:38px;
  box-shadow:
    0 3px 10px rgba(0,0,0,.09),
    0 1px 3px rgba(0,0,0,.05),
    inset 0 1px 2px rgba(255,255,255,.9);
  transition:box-shadow .2s;
  position:relative;
}
/* 4種のバリエーション */
.ev-wrap:nth-child(4n+1) .ev-card{border-radius:30px 22px 32px 24px / 24px 32px 20px 30px}
.ev-wrap:nth-child(4n+2) .ev-card{border-radius:22px 32px 26px 30px / 30px 22px 32px 24px}
.ev-wrap:nth-child(4n+3) .ev-card{border-radius:28px 24px 30px 20px / 20px 30px 24px 28px}
.ev-wrap:nth-child(4n+0) .ev-card{border-radius:24px 28px 22px 32px / 32px 20px 28px 22px}

.drag-handle{font-size:13px;color:#c8c8c8;cursor:grab;line-height:1;flex-shrink:0;padding:4px 2px;touch-action:none}
.drag-handle:active{cursor:grabbing}
.ev-name{font-size:14px;font-weight:500;color:#1a1a1a;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif;min-width:0}
.ev-name::placeholder{color:#ccc;font-weight:400}
.list-toggle{width:26px;height:26px;border-radius:50%;border:none;background:rgba(46,125,120,.1);color:#2E7D78;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;font-weight:700;transition:all .15s}
.list-toggle.open{background:#2E7D78;color:#fff}

/* チェックリスト */
.checklist{background:rgba(255,255,255,.72);border-radius:0 0 20px 22px;margin-top:-5px;padding:6px 10px 8px;display:none}
.checklist.open{display:block;background:linear-gradient(160deg,#dbeafe 0%,#bfdbfe 100%);border-top:1.5px solid rgba(147,197,253,.45)}
.check-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid rgba(147,197,253,.35)}
.check-item:last-of-type{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:7px;border:1.5px solid #93c5fd;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;font-size:13px}
.check-box.checked{background:#3b82f6;border-color:#3b82f6;color:#fff}
.check-text{font-size:13px;color:#1a1a1a;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif}
.check-text.done{text-decoration:line-through;color:#999}
.check-del{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#93c5fd;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.add-check{display:flex;align-items:center;gap:8px;padding:6px 0;margin-top:2px}
.add-check-input{font-size:13px;color:#666;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif}
.add-check-input::placeholder{color:#93c5fd}

/* ── 線路コネクター ── */
.connector{display:flex;align-items:stretch}
.conn-left{width:58px;flex-shrink:0;display:flex;justify-content:flex-end;padding-right:8px}
.conn-bar-col{
  position:relative;
  width:20px;height:100%;
  display:flex;flex-direction:column;align-items:stretch;
}
/* 左右のレール */
.conn-bar-col::before,.conn-bar-col::after{
  content:'';
  position:absolute;top:0;bottom:0;
  width:2.5px;
  background:linear-gradient(to bottom,rgba(46,125,120,.7) 0%,rgba(46,125,120,.18) 100%);
  border-radius:2px;
  z-index:1;
}
.conn-bar-col::before{left:2px}
.conn-bar-col::after{right:2px}
/* 枕木 */
.conn-bar{
  flex:1;
  width:100%;
  min-height:8px;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 7px,
    rgba(46,125,120,.26) 7px, rgba(46,125,120,.26) 10px
  );
}
.conn-right{flex:1;display:flex;align-items:center;justify-content:center}
.dur-btn{
  display:flex;align-items:center;gap:4px;cursor:pointer;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(46,125,120,.1);
  border:1px solid rgba(46,125,120,.18);
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;font-weight:500;color:#2E7D78;
  touch-action:manipulation;
}
.dur-btn:active{background:rgba(46,125,120,.22)}
.dur-btn.locked{background:rgba(180,100,0,.18);border-color:rgba(200,130,0,.6);color:#a06400;font-weight:700;border-width:1.5px}
.dur-btn.locked:active{background:rgba(180,100,0,.2)}
.dur-btn.warn{background:rgba(220,53,34,.1);border-color:rgba(220,53,34,.4);color:#dc3522;}
.dur-btn.warn:active{background:rgba(220,53,34,.2)}

/* ── ピッカー ── */
.dur-picker{position:fixed;z-index:900;background:#fff;border-top:.5px solid #e0e0e0;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);width:100%;left:0;right:0;bottom:0;overflow:hidden;display:none}
.dur-inner{height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;overscroll-behavior:contain;touch-action:pan-y}
.dur-inner::-webkit-scrollbar{display:none}
.dur-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;scroll-snap-align:center;cursor:pointer;color:#1a1a1a;touch-action:manipulation;font-family:'M PLUS Rounded 1c',sans-serif}
.dur-item.sel{color:#2E7D78}
.dur-hl{position:absolute;left:0;right:0;top:90px;height:40px;border-top:1.5px solid #2E7D78;border-bottom:1.5px solid #2E7D78;pointer-events:none}

/* ── 時刻ポップアップ ── */
.time-popup{position:fixed;z-index:950;background:#fff;border:.5px solid #e0e0e0;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:20px 20px 36px;width:100%;display:none}
.tp-drum{overflow-y:scroll;height:160px;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}
.tp-drum::-webkit-scrollbar{display:none}
.tp-drum-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;scroll-snap-align:center;cursor:pointer;color:#1a1a1a;font-family:'M PLUS Rounded 1c',sans-serif;user-select:none}
.tp-drum-item.sel{color:#2E7D78;font-weight:700}
.tp-drum-pad{height:60px;flex-shrink:0}
.tp-hl{position:absolute;left:0;right:0;top:60px;height:40px;border-top:1.5px solid #2E7D78;border-bottom:1.5px solid #2E7D78;pointer-events:none}
.tp-fix{padding:8px 14px;border-radius:10px;border:.5px solid #e0e0e0;background:transparent;font-size:12px;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;color:#1a1a1a}
.tp-fix.on{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.4);color:#c0392b;font-weight:700}
.tp-ok{padding:8px 20px;border-radius:10px;border:none;background:#2E7D78;color:#fff;font-size:12px;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;font-weight:700}
.dur-lock{padding:5px 12px;border-radius:10px;border:.5px solid #e0e0e0;background:transparent;font-size:12px;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;color:#888;touch-action:manipulation}
.dur-lock.on{background:rgba(46,125,120,.1);border-color:rgba(46,125,120,.45);color:#2E7D78;font-weight:700}
</style>
</head>
<body>

<div id="ptr-indicator">↻ 離してリロード</div>
<div class="app" id="app">
  <div class="app-head" id="appHead">
    <div class="trip-name-row collapsible">
      <input class="trip-name" id="tripName" value="旅のしおり" placeholder="旅行名">
    </div>
    <div class="date-nav">
      <button class="nav-btn" id="prevDay">‹</button>
      <div class="date-center">
        <div class="date-display" id="dateDisplay">—</div>
      </div>
      <button class="nav-btn" id="nextDay">›</button>
    </div>
    <div class="date-dots-wrap collapsible">
      <div class="date-dots" id="dateDots"></div>
    </div>
  </div>

  <div class="slide-viewport" id="slideViewport">
    <div class="slide-track" id="slideTrack">
      <div class="slide-pane" id="panePrev"></div>
      <div class="slide-pane" id="paneCur">
        <div class="timeline-area" id="timelineArea"></div>
      </div>
      <div class="slide-pane" id="paneNext" style="position:relative">
        <div class="create-overlay" id="createOverlay">
          <div class="co-icon">＋</div>
          <div class="co-label" id="createLabel">日程を作成</div>
        </div>
      </div>
    </div>
  </div>
</div>
<button class="del-day-btn" id="delDayBtn">日程削除</button>

<div class="dur-picker" id="durPicker">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:.5px solid #f0f0f0">
    <button id="durLock" class="dur-lock">🔓 固定</button>
    <span style="font-size:13px;font-weight:700;color:#888;font-family:'M PLUS Rounded 1c',sans-serif">所要時間</span>
    <button id="durClose" style="border:none;background:rgba(0,0,0,.06);border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;color:#666">×</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMQAwcnkgQcwQl1gDiuMRqybw0zNFjVMw",
  authDomain: "travel-app-1c301.firebaseapp.com",
  projectId: "travel-app-1c301",
  storageBucket: "travel-app-1c301.firebasestorage.app",
  messagingSenderId: "410781369240",
  appId: "1:410781369240:web:279933e3693841ae40a1ed"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLのハッシュを旅程IDとして使う（なければ新規作成）
let tripId = location.hash.slice(1);
if (!tripId) {
  tripId = crypto.randomUUID();
  location.hash = tripId;
}

const STEP=5,MAX_DUR=300;
let nextId=100;
let days=[];
let curDay=0;
let dragSrc=null;
let durPickerIdx=null,timePopupIdx=null,tpFixed=false,durLocked=false;

function mkEvent(name,fixedTime,dur){return{id:nextId++,name,fixedTime,dur,durLocked:false,checks:[],open:false};}

// ══════════════════════════════════════════════════════════
//  保存・同期ロジック（信頼性重視版）
//
//  設計方針：
//  1. 自分の入力は即座にローカルのdaysに書き込む
//  2. saveToFirestore()は常に現在のdaysを丸ごとアップロードする
//  3. onSnapshotが届いたら「自分が今フォーカス中のフィールド」以外をマージする
//  4. 「自分の書き込みエコー」はhasPendingWritesで弾く（clientId不要）
// ══════════════════════════════════════════════════════════

let saveTimer = null;

// 現在フォーカス中の入力情報を追跡
let focusedField = null; // {dayIdx, evId, field} or null
document.addEventListener('focusin', e => {
  const inp = e.target;
  if(inp.tagName !== 'INPUT' && inp.tagName !== 'TEXTAREA'){ focusedField=null; return; }
  const evIdx = inp.dataset.evIdx;
  const role  = inp.dataset.role;
  const dayIdx= inp.dataset.dayIdx;
  if(evIdx != null && role && dayIdx != null){
    const ev = days[dayIdx]?.events[evIdx];
    focusedField = ev ? {dayIdx:+dayIdx, evId:ev.id, field:role} : null;
  } else {
    focusedField = null;
  }
}, true);
document.addEventListener('focusout', () => { focusedField=null; }, true);

function saveToFirestore(){
  clearTimeout(saveTimer);
  const snapshot = {
    days: JSON.parse(JSON.stringify(days)),
    tripName: document.getElementById('tripName').value,
    ts: Date.now()
  };
  saveTimer = setTimeout(async () => {
    try{
      await setDoc(doc(db,'trips',tripId), snapshot);
    } catch(err){
      console.error('save failed', err);
      showToast('⚠️ 保存失敗。ネット接続を確認してください。');
    }
    saveTimer = null;
  }, 400);
}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:8px 16px;border-radius:12px;font-size:12px;z-index:9999;font-family:"M PLUS Rounded 1c",sans-serif;white-space:nowrap';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

// フィールドレベルマージ：リモートのdaysを受け取り、
// 自分がフォーカス中のフィールドだけ上書きしないでローカル値を守る
function mergeRemoteDays(remoteDays){
  // 日程数が違う場合はリモートを優先しつつローカルの新規日程を末尾に追加
  const result = JSON.parse(JSON.stringify(remoteDays));

  // ローカルにしかない日程（新規追加）を追加
  for(let di=remoteDays.length; di<days.length; di++){
    result.push(JSON.parse(JSON.stringify(days[di])));
  }

  // 既存日程内のイベントをフィールドレベルでマージ
  result.forEach((remDay, di) => {
    if(!days[di]) return; // ローカルにない日程はリモートをそのまま使う
    remDay.events.forEach(remEv => {
      const locEv = days[di].events.find(e => e.id === remEv.id);
      if(!locEv) return; // ローカルにないイベントはリモートをそのまま
      // フォーカス中のフィールドはローカル値を守る
      const EV_FIELDS = ['name','fixedTime','dur','durLocked','checks','open'];
      EV_FIELDS.forEach(f => {
        const isFocused = focusedField &&
          focusedField.dayIdx===di &&
          focusedField.evId===remEv.id &&
          focusedField.field===f;
        if(isFocused){
          remEv[f] = locEv[f]; // 自分が編集中 → ローカル値を守る
        }
      });
    });
    // ローカルで追加したイベント（リモートにない）を追加
    const remIds = new Set(remDay.events.map(e=>e.id));
    days[di].events.forEach(locEv => {
      if(!remIds.has(locEv.id)){
        remDay.events.push(JSON.parse(JSON.stringify(locEv)));
      }
    });
  });

  return result;
}

// Firestoreからリアルタイム受信
let initialLoadDone = false;
onSnapshot(doc(db,'trips',tripId), snap => {
  // 自分の書き込みがサーバー未確認の間のエコーは無視
  if(snap.metadata.hasPendingWrites) return;

  if(!snap.exists()){
    // 初回：デフォルトデータ
    if(initialLoadDone) return;
    initialLoadDone = true;
    days=[{
      date:'10/10',
      events:[
        mkEvent('玉名出発','07:00',70),
        mkEvent('駐車場',null,70),
        mkEvent('空港・ラウンジ休憩',null,35),
        mkEvent('飛行機チェックイン',null,60),
        mkEvent('熊本発','06:35',105),
        mkEvent('羽田着',null,35),
        mkEvent('電車移動',null,0),
        mkEvent('ホテル着',null,null),
      ]
    }];
    renderHeader();renderTimeline();
    saveToFirestore();
    return;
  }

  const data = snap.data();
  const remoteDays = data.days || [];

  if(!initialLoadDone){
    // 初回ロード：リモートをそのまま使う
    initialLoadDone = true;
    days = remoteDays;
    document.getElementById('tripName').value = data.tripName || '';
    days.forEach(d=>d.events.forEach(e=>{if(e.id>=nextId)nextId=e.id+1;}));
    curDay = Math.min(curDay, Math.max(0, days.length-1));
    renderHeader();renderTimeline();
    return;
  }

  // 以降：他の人の更新をマージ
  // 自分が書き込み中（saveTimer残っている）の場合は、
  // マージ後に再保存して自分の変更を確実に上書き
  const merged = mergeRemoteDays(remoteDays);
  if(data.tripName) document.getElementById('tripName').value = data.tripName;
  merged.forEach(d=>d.events.forEach(e=>{if(e.id>=nextId)nextId=e.id+1;}));
  days = merged;
  curDay = Math.min(curDay, Math.max(0, days.length-1));

  // フォーカス中の入力欄の値をDOMに反映（再描画で上書きされないように）
  const activeEl = document.activeElement;
  const activeVal = activeEl?.value;
  const activeRole = activeEl?.dataset?.role;
  const activeEvIdx = activeEl?.dataset?.evIdx;
  const activeDayIdx = activeEl?.dataset?.dayIdx;

  renderHeader();renderTimeline();

  // フォーカスと入力値を復元
  if(activeEl && activeVal != null){
    const restored = document.querySelector(
      `[data-role="${activeRole}"][data-ev-idx="${activeEvIdx}"][data-day-idx="${activeDayIdx}"]`
    );
    if(restored){ restored.value=activeVal; restored.focus(); }
  }

  // 自分の変更が残っている場合は再保存（マージ結果で確定させる）
  if(saveTimer !== null){
    clearTimeout(saveTimer);
    saveTimer = null;
    saveToFirestore();
  }
});

function getEvents(){return days[curDay]?days[curDay].events:[];}
function parseT(s){if(!s||!s.includes(':'))return null;const[h,m]=s.split(':').map(Number);return isNaN(h)||isNaN(m)?null:h*60+m}
function fmtT(m){if(m==null||isNaN(m))return'--:--';const h=Math.floor(m/60)%24,mm=m%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}

function computeTimes(evs){
  const n=evs.length,times=new Array(n).fill(null);
  // まず固定時刻を埋める
  for(let i=0;i<n;i++)if(evs[i].fixedTime)times[i]=parseT(evs[i].fixedTime);

  // 2つの固定時刻の間の所要時間を自動按分
  for(let i=0;i<n-1;i++){
    if(times[i]==null) continue;
    // 次の固定時刻を探す
    for(let j=i+1;j<n;j++){
      if(times[j]!=null){
        const span=times[j]-times[i]; // 区間の総時間
        const between=j-i; // 区間内のイベント数
        if(span>=0&&between>0){
          // 区間内に所要時間未設定のものがあれば均等分割
          const hasUnset=evs.slice(i,j).some(e=>!e.durLocked&&(e.dur==null||isNaN(e.dur)));
          if(hasUnset){
            const lockedDur=evs.slice(i,j).reduce((s,e)=>s+(e.durLocked?(e.dur||0):0),0);
            const unlockedCount=evs.slice(i,j).filter(e=>!e.durLocked).length;
            if(unlockedCount>0){
              const each=Math.floor((span-lockedDur)/unlockedCount/STEP)*STEP;
              for(let k=i;k<j;k++) if(!evs[k].durLocked) evs[k].dur=Math.max(0,each);
            }
          }
        }
        break;
      }
    }
  }

  // 前→後ろ方向に順算
  let cur=null;
  for(let i=0;i<n;i++){
    if(evs[i].fixedTime){cur=parseT(evs[i].fixedTime);times[i]=cur;}
    else if(cur!==null&&i>0){const d=evs[i-1].dur;if(d!=null&&!isNaN(d)){cur=cur+d;times[i]=cur;}else cur=null;}
  }
  // 後ろ→前方向に逆算
  for(let i=n-1;i>=0;i--){
    if(times[i]!=null){
      let base=times[i];
      for(let j=i-1;j>=0;j--){
        if(times[j]!=null) break;
        const dur=evs[j].dur;
        if(dur!=null&&!isNaN(dur)){base=base-dur;times[j]=base;}
        else break;
      }
    }
  }
  return times;
}

function maxDurFor(idx,times,evs){
  for(let j=idx+1;j<evs.length;j++){
    if(evs[j].fixedTime){
      const a=parseT(evs[j].fixedTime);
      if(a!=null&&times[idx]!=null){let o=0;for(let k=idx+1;k<j-1;k++)o+=(evs[k].dur||0);return Math.max(0,Math.floor((a-times[idx]-o)/STEP)*STEP);}
    }
  }
  return MAX_DUR;
}

function goDay(d){curDay=Math.max(0,Math.min(days.length-1,d));renderHeader();renderTimeline();}

// ── スライド日移動 グローバル関数群 ──────────────────────
const COMMIT_RATIO    = 0.35;
const CREATE_RATIO    = 0.33;
const CREATE_COMMIT_RATIO = 0.55;

function getSlideW(){ return (document.getElementById('slideViewport')||{}).offsetWidth || window.innerWidth; }

function setTrackX(x, animate){
  const track    = document.getElementById('slideTrack');
  const viewport = document.getElementById('slideViewport');
  if(!track||!viewport) return;
  const W   = viewport.offsetWidth;
  const base= -100/3;
  const pct = base + (x/W)*(100/3);
  track.style.transition = animate ? 'transform .32s cubic-bezier(.4,0,.2,1)' : 'none';
  track.style.transform  = `translateX(${pct}%)`;
}

function renderPaneContent(pane, dayIdx){
  if(!pane) return;
  pane.innerHTML='';
  if(dayIdx < 0 || dayIdx >= days.length) return;
  const frag=document.createElement('div');
  frag.className='timeline-area';
  frag.style.cssText='pointer-events:none;opacity:.52;';
  renderTimelineInto(frag, days[dayIdx].events, dayIdx);
  pane.appendChild(frag);
}

function prepareAdjacentPanes(){
  const overlay  = document.getElementById('createOverlay');
  const panePrev = document.getElementById('panePrev');
  const paneNext = document.getElementById('paneNext');
  renderPaneContent(panePrev, curDay-1);
  paneNext.innerHTML='';
  if(curDay < days.length-1){
    const frag=document.createElement('div');
    frag.className='timeline-area';
    frag.style.cssText='pointer-events:none;opacity:.52;';
    renderTimelineInto(frag, days[curDay+1].events, curDay+1);
    paneNext.appendChild(frag);
  } else {
    if(overlay){ paneNext.appendChild(overlay); overlay.style.opacity='0'; overlay.style.minHeight='200px'; }
  }
  setTrackX(0,false);
}

function addDay(){
  const last=days[days.length-1];
  let newDate='';
  if(last&&last.date&&last.date.includes('/')){
    const parts=last.date.split('/');
    const year=new Date().getFullYear();
    const dt=new Date(year,parseInt(parts[0])-1,parseInt(parts[1])+1);
    newDate=`${dt.getMonth()+1}/${dt.getDate()}`;
  }
  days.push({date:newDate,events:[]});
  curDay=days.length-1;
  renderHeader();renderTimeline();saveToFirestore();
}

// ── タッチスワイプ ──
(function(){
  let swX=null,swY=null,swLocked=null,swActive=false;

  function getOverlay(){ return document.getElementById('createOverlay'); }
  function getCreateLbl(){ return document.getElementById('createLabel'); }

  document.addEventListener('touchstart',e=>{
    if(document.getElementById('durPicker').style.display==='block') return;
    if(document.getElementById('timePopup').style.display==='block') return;
    if(touchDragData) return;
    // input要素上は無視
    if(e.target.closest('input,button,.drag-handle,.dur-btn,.ev-time,.list-toggle,.check-box,.ev-delete-badge')) return;
    swX=e.touches[0].clientX;
    swY=e.touches[0].clientY;
    swLocked=null; swActive=false;
    document.getElementById('slideViewport').style.touchAction='pan-y';
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(swX===null||touchDragData) return;
    const dx=e.touches[0].clientX-swX;
    const dy=e.touches[0].clientY-swY;
    if(swLocked===null){
      if(Math.abs(dy)>Math.abs(dx)+10){ swLocked='y'; return; }
      if(Math.abs(dx)>8){
        swLocked='x'; swActive=true;
        document.getElementById('slideViewport').style.touchAction='none';
        prepareAdjacentPanes();
      }
    }
    if(swLocked!=='x') return;

    const W=getSlideW();
    let cdx=dx;

    // 一番左（前日なし）：引っ張り感
    if(dx>0 && curDay<=0) cdx=dx*0.22;
    // 一番右（次の日なし）：日程作成ゾーン
    if(dx<0 && curDay>=days.length-1){
      cdx=dx*0.78;
      const ratio=Math.abs(dx)/W;
      const ov=getOverlay(); const lb=getCreateLbl();
      if(ratio>CREATE_RATIO){
        if(ov) ov.style.opacity=String(Math.min(1,(ratio-CREATE_RATIO)/0.15));
        if(lb) lb.textContent=ratio>=CREATE_COMMIT_RATIO?'→ 離して作成！':'日程を作成';
      } else {
        if(ov) ov.style.opacity='0';
      }
    } else {
      const ov=getOverlay(); if(ov) ov.style.opacity='0';
    }
    setTrackX(cdx,false);
  },{passive:true});

  document.addEventListener('touchend',e=>{
    document.getElementById('slideViewport').style.touchAction='pan-y';
    const ov=getOverlay(); if(ov) ov.style.opacity='0';
    if(!swActive||swLocked!=='x'||touchDragData){ swX=null;swY=null;swLocked=null;swActive=false; return; }
    const dx=e.changedTouches[0].clientX-swX;
    const W=getSlideW();
    const ratio=Math.abs(dx)/W;
    swX=null;swY=null;swLocked=null;swActive=false;

    // 入力中のblurを強制してから保存
    if(document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')){
      document.activeElement.blur();
    }

    if(dx < -W*COMMIT_RATIO){
      if(curDay < days.length-1){
        saveToFirestore();
        setTrackX(-W,true);
        setTimeout(()=>{ curDay++; renderHeader(); renderTimeline(); },320);
      } else if(ratio>=CREATE_COMMIT_RATIO){
        setTrackX(-W,true);
        setTimeout(()=>{ addDay(); },320);
      } else {
        setTrackX(0,true);
      }
    } else if(dx > W*COMMIT_RATIO && curDay>0){
      saveToFirestore();
      setTrackX(W,true);
      setTimeout(()=>{ curDay--; renderHeader(); renderTimeline(); },320);
    } else {
      setTrackX(0,true);
    }
  },{passive:true});

  // ナビボタン
  document.getElementById('prevDay').addEventListener('click',()=>{
    if(curDay<=0) return;
    prepareAdjacentPanes();
    setTrackX(getSlideW(),true);
    setTimeout(()=>{ curDay--; renderHeader(); renderTimeline(); },320);
  });
  document.getElementById('nextDay').addEventListener('click',()=>{
    if(curDay>=days.length-1) return;
    prepareAdjacentPanes();
    setTrackX(-getSlideW(),true);
    setTimeout(()=>{ curDay++; renderHeader(); renderTimeline(); },320);
  });
})();

document.getElementById('delDayBtn').addEventListener('click',()=>{
  if(days.length<=1){
    // 最後の1日は削除させない
    const hint=document.createElement('div');
    hint.textContent='日程は最低1日必要です';
    hint.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#666;color:#fff;padding:8px 16px;border-radius:12px;font-size:12px;z-index:9999;font-family:"M PLUS Rounded 1c",sans-serif';
    document.body.appendChild(hint);setTimeout(()=>hint.remove(),2500);
    return;
  }
  if(!confirm(`${days[curDay].date||'この日程'}を削除しますか？`))return;
  days.splice(curDay,1);
  curDay=Math.min(curDay,days.length-1);
  renderHeader();renderTimeline();saveToFirestore();
});

function renderHeader(){
  const d=days[curDay];
  const disp=document.getElementById('dateDisplay');
  const prev=document.getElementById('prevDay');
  const next=document.getElementById('nextDay');
  if(!d){disp.textContent='—';}
  else{
    disp.innerHTML='';
    // カレンダー選択式inputに変更
    const inp=document.createElement('input');
    inp.type='date';
    // 既存の日付文字列をdate型に変換（M/D → YYYY-MM-DD）
    if(d.date&&d.date.includes('/')){
      const parts=d.date.split('/');
      const year=new Date().getFullYear();
      inp.value=`${year}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;
    } else if(d.date){
      inp.value=d.date;
    }
    inp.style.cssText='background:transparent;border:none;outline:none;text-align:center;font-family:"M PLUS Rounded 1c",sans-serif;font-size:17px;font-weight:700;color:#fff;width:160px;color-scheme:dark;';
    inp.addEventListener('change',function(){
      // YYYY-MM-DD → M/D 形式で保存
      if(this.value){
        const [y,m,dd]=this.value.split('-');
        days[curDay].date=`${parseInt(m)}/${parseInt(dd)}`;
      }
      renderDots();saveToFirestore();
    });
    disp.appendChild(inp);
  }
  prev.style.opacity=curDay<=0?.3:1;
  next.style.opacity=curDay>=days.length-1?.3:1;
  renderDots();
}

function renderDots(){
  const dots=document.getElementById('dateDots');dots.innerHTML='';
  days.forEach((d,i)=>{
    const dot=document.createElement('div');
    dot.className='dot'+(i===curDay?' active':d.events.length?' has-event':'');
    dot.addEventListener('click',()=>goDay(i));
    dots.appendChild(dot);
  });
}

window.addEventListener('scroll',()=>{
  const isCompact = window.scrollY > 28;
  document.getElementById('appHead').classList.toggle('compact', isCompact);
  document.getElementById('delDayBtn').classList.toggle('hidden', isCompact);
},{passive:true});

/* ── ドラッグ&ドロップ ── */
let touchDragData=null;
let touchClone=null;

function exitJiggle(){
  document.querySelectorAll('.ev-wrap.jiggle').forEach(el=>{
    if(el._exitJiggle) el._exitJiggle();
    else el.classList.remove('jiggle');
  });
}

function hideAllAddBtns(){
  document.querySelectorAll('.conn-add-btn.visible').forEach(b=>b.classList.remove('visible'));
}

function setupDragDrop(){
  /* ── イベントカード：長押し削除 & デスクトップドラッグ ── */
  document.querySelectorAll('.ev-wrap').forEach((el,i)=>{
    // デスクトップ drag
    el.draggable=true;
    el.addEventListener('dragstart',e=>{
      if(e.target.closest('.ev-name,.list-toggle,.check-box,.check-text,.add-check-input,.ev-time,.dur-btn,.ev-del-btn'))return e.preventDefault();
      exitJiggle();
      dragSrc=i;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(i));
      setTimeout(()=>el.classList.add('dragging'),0);
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragSrc=null;cleanDZ();});

    // タップで jiggle 解除
    el.addEventListener('click',ev=>{
      if(el.classList.contains('jiggle')){ev.stopPropagation();return;}
    });
  });

  /* ドラッグハンドル：タッチ並び替え */
  document.querySelectorAll('.drag-handle').forEach((handle,i)=>{
    handle.addEventListener('touchstart',e=>{
      exitJiggle();
      e.stopPropagation();
      const t=e.touches[0];
      touchDragData={src:i,startX:t.clientX,startY:t.clientY};
      createTouchClone('⠿',t.clientX,t.clientY,'#2E7D78');
    },{passive:true});
  });

  /* ドロップゾーン（デスクトップ）*/
  document.querySelectorAll('.drop-zone').forEach(dz=>{
    dz.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';cleanDZ();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();handleDrop(parseInt(dz.dataset.insert));});
  });

  /* コネクター長押し → ＋ボタン出現 → ドラッグで挿入 */
  document.querySelectorAll('.connector').forEach((conn,ci)=>{
    let lpTimer=null;
    const addBtn=conn.querySelector('.conn-add-btn');
    if(!addBtn) return;
    const ins=parseInt(addBtn.dataset.insertIdx);

    // タッチ長押し開始
    conn.addEventListener('touchstart',e=>{
      if(touchDragData)return;
      if(e.target.closest('.dur-btn,.conn-add-btn'))return;
      const t=e.touches[0];
      lpTimer=setTimeout(()=>{
        lpTimer=null;
        hideAllAddBtns();
        addBtn.classList.add('visible');
        if(navigator.vibrate)navigator.vibrate(40);
      },800);
    },{passive:true});

    conn.addEventListener('touchend',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}},{passive:true});
    conn.addEventListener('touchcancel',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}},{passive:true});
    conn.addEventListener('touchmove',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}},{passive:true});

    // ＋ボタンを長押し/ドラッグして挿入
    addBtn.addEventListener('touchstart',e=>{
      e.stopPropagation();
      const t=e.touches[0];
      // addBtnは表示のまま維持、クローンは作らない
      // touchDragDataにnew-addボタン専用フラグ
      touchDragData={src:'new-add',insertIdx:ins,origBtn:addBtn,startX:t.clientX,startY:t.clientY};
    },{passive:true});

    // デスクトップ
    conn.addEventListener('mousedown',e=>{
      if(touchDragData)return;
      if(e.target.closest('.dur-btn,.conn-add-btn'))return;
      lpTimer=setTimeout(()=>{
        lpTimer=null;
        hideAllAddBtns();
        addBtn.classList.add('visible');
        if(navigator.vibrate)navigator.vibrate(40);
      },800);
    });
    conn.addEventListener('mouseup',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}});
    conn.addEventListener('mouseleave',()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}});

    addBtn.addEventListener('mousedown',e=>{
      e.stopPropagation();
      touchDragData={src:'new-add',insertIdx:ins,origBtn:addBtn,startX:e.clientX,startY:e.clientY};
    });
  });

  /* ev-name 2秒長押し → 削除モード */
  document.querySelectorAll('.ev-name').forEach((nameIn,i)=>{
    let lpTimer=null;
    function lpStart(e){
      // 既にjiggleなら無視
      if(nameIn.closest('.ev-wrap')?.classList.contains('jiggle')) return;
      lpTimer=setTimeout(()=>{
        nameIn.blur();
        const wrap=nameIn.closest('.ev-wrap');
        exitJiggle();
        if(wrap?._enterJiggle) wrap._enterJiggle();
        else wrap?.classList.add('jiggle');
      },2000);
    }
    function lpEnd(){clearTimeout(lpTimer);lpTimer=null;}
    nameIn.addEventListener('mousedown',lpStart);
    nameIn.addEventListener('mouseup',lpEnd);
    nameIn.addEventListener('touchstart',lpStart,{passive:true});
    nameIn.addEventListener('touchend',lpEnd);
    nameIn.addEventListener('touchcancel',lpEnd);
    nameIn.addEventListener('touchmove',lpEnd,{passive:true});
  });
}

function createTouchClone(text,x,y,color){
  removeTouchClone();
  const bg=color||'#2E7D78';
  touchClone=document.createElement('div');
  touchClone.textContent=text;
  touchClone.style.cssText=`position:fixed;left:${x-22}px;top:${y-22}px;width:44px;height:44px;background:${bg};color:#fff;border-radius:50%;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9999;opacity:.92;box-shadow:0 4px 16px rgba(0,0,0,.22);font-family:'M PLUS Rounded 1c',sans-serif;line-height:1`;
  document.body.appendChild(touchClone);
}
function removeTouchClone(){if(touchClone){touchClone.remove();touchClone=null;}}

document.addEventListener('touchmove',e=>{
  if(!touchDragData)return;
  const t=e.touches[0];

  if(touchDragData.src==='new-add'){
    const btn=touchDragData.origBtn;
    if(btn){
      btn.style.position='fixed';
      btn.style.left=(t.clientX-15)+'px';
      btn.style.top=(t.clientY-15)+'px';
      btn.style.zIndex='9999';
      btn.style.pointerEvents='none';
    }
    cleanDZ();
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el){const dz=el.closest('.drop-zone');if(dz)dz.classList.add('over');}
    return;
  }

  if(touchClone){touchClone.style.left=(t.clientX-22)+'px';touchClone.style.top=(t.clientY-22)+'px';}
  cleanDZ();
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){const dz=el.closest('.drop-zone');if(dz)dz.classList.add('over');}
},{passive:true});

document.addEventListener('touchend',e=>{
  hideAllAddBtns();

  if(touchDragData?.src==='new-add'){
    const btn=touchDragData.origBtn;
    if(btn){btn.style.cssText='';}
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    let ins=null;
    if(el){const dz=el.closest('.drop-zone');if(dz)ins=parseInt(dz.dataset.insert);}
    cleanDZ();
    touchDragData=null;
    if(ins!==null){
      days[curDay].events.splice(ins,0,mkEvent('新しいイベント',null,60));
      renderTimeline();saveToFirestore();
      setTimeout(()=>{const ns=document.querySelectorAll('.ev-name');if(ns[ins]){ns[ins].focus();ns[ins].select();}},50);
    }
    return;
  }

  if(!touchDragData){removeTouchClone();return;}
  removeTouchClone();
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){
    const dz=el.closest('.drop-zone');
    if(dz){handleDrop(parseInt(dz.dataset.insert),touchDragData.src);}
  }
  cleanDZ();
  touchDragData=null;
});

function handleDrop(ins,src){
  const s=src!==undefined?src:dragSrc;
  const evs=getEvents();
  if(typeof s==='number'&&s!==ins&&s!==ins-1){
    const moved=evs.splice(s,1)[0];
    const ni=ins>s?ins-1:ins;
    evs.splice(ni,0,moved);
    dragSrc=null;renderTimeline();saveToFirestore();
  } else{dragSrc=null;renderTimeline();}
}

function cleanDZ(){
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('over'));
}

// 画面どこかタップでjiggle解除（ev-del-btn以外）
document.addEventListener('click',e=>{
  if(e.target.closest('.ev-del-btn')) return;
  if(!e.target.closest('.ev-wrap.jiggle')) exitJiggle();
},{capture:true});

function openDurPicker(idx,el){
  if(durPickerIdx===idx){closeDurPicker();return;}
  closeTimePopup();durPickerIdx=idx;
  const evs=getEvents(),times=computeTimes(evs);
  const maxD=maxDurFor(idx,times,evs),cur=evs[idx].dur??0;
  durLocked=!!evs[idx].durLocked;
  document.getElementById('durLock').className='dur-lock'+(durLocked?' on':'');
  document.getElementById('durLock').textContent=durLocked?'🔒 固定':'🔓 固定';
  const inner=document.getElementById('durInner');inner.innerHTML='';
  const opts=[];for(let v=0;v<=Math.min(maxD,MAX_DUR);v+=STEP)opts.push(v);
  // 上下パッド（0分・最大分を中央に選択できるように）
  const padT=document.createElement('div');padT.style.cssText='height:90px;flex-shrink:0';inner.appendChild(padT);
  opts.forEach(v=>{
    const d=document.createElement('div');d.className='dur-item'+(v===cur?' sel':'');d.textContent=v+'分';
    d.addEventListener('click',()=>{evs[idx].dur=v;evs[idx].durLocked=durLocked;closeDurPicker();renderTimeline();saveToFirestore();});
    inner.appendChild(d);
  });
  const padB=document.createElement('div');padB.style.cssText='height:90px;flex-shrink:0';inner.appendChild(padB);
  const p=document.getElementById('durPicker');
  p.style.cssText='display:block;position:fixed;bottom:0;left:0;right:0;width:100%;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:900;background:#fff;border-top:.5px solid #e0e0e0;overflow:hidden;';
  document.body.style.overflow='hidden';
  const si=opts.indexOf(cur);if(si>=0)inner.scrollTop=si*40;
  setTimeout(()=>document.addEventListener('click',durOut),10);
}
function durOut(e){if(!document.getElementById('durPicker').contains(e.target))closeDurPicker();}
function closeDurPicker(){document.getElementById('durPicker').style.display='none';durPickerIdx=null;document.removeEventListener('click',durOut);document.body.style.overflow='';}

document.getElementById('durClose').addEventListener('click',closeDurPicker);
document.getElementById('durLock').addEventListener('click',function(e){
  e.stopPropagation();
  durLocked=!durLocked;
  this.className='dur-lock'+(durLocked?' on':'');
  this.textContent=durLocked?'🔒 固定':'🔓 固定';
  // 即座にイベントデータに反映して保存
  if(durPickerIdx!=null){
    const evs=getEvents();
    if(evs[durPickerIdx]) {
      evs[durPickerIdx].durLocked=durLocked;
      saveToFirestore();
    }
  }
});

function buildDrum(drumEl, items, selectedVal) {
  drumEl.innerHTML = '';
  const padT = document.createElement('div'); padT.className = 'tp-drum-pad'; drumEl.appendChild(padT);
  items.forEach(v => {
    const d = document.createElement('div');
    d.className = 'tp-drum-item' + (v === selectedVal ? ' sel' : '');
    d.textContent = String(v).padStart(2, '0');
    drumEl.appendChild(d);
  });
  const padB = document.createElement('div'); padB.className = 'tp-drum-pad'; drumEl.appendChild(padB);
  const idx = items.indexOf(selectedVal);
  if (idx >= 0) drumEl.scrollTop = idx * 40;
}

function getDrumValue(drumEl) {
  const idx = Math.round(drumEl.scrollTop / 40);
  const items = Array.from(drumEl.querySelectorAll('.tp-drum-item'));
  return items[idx] ? parseInt(items[idx].textContent) : 0;
}

const HOURS = Array.from({length:24},(_,i)=>i);
const MINS  = Array.from({length:12},(_,i)=>i*5); // 0,5,10,...,55

function openTimePopup(idx,el){
  if(timePopupIdx===idx){closeTimePopup();return;}
  closeDurPicker();timePopupIdx=idx;
  const evs=getEvents(),times=computeTimes(evs);
  const t=times[idx]??540; // デフォルト9:00
  tpFixed=!!evs[idx].fixedTime;
  const h=Math.floor(t/60)%24;
  const m=Math.round((t%60)/5)*5%60;
  buildDrum(document.getElementById('tpHourDrum'), HOURS, h);
  buildDrum(document.getElementById('tpMinDrum'),  MINS,  m);
  document.getElementById('tpFix').className='tp-fix'+(tpFixed?' on':'');
  const p=document.getElementById('timePopup');
  p.style.cssText='display:block;position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:20px 20px 36px;z-index:950;background:#fff;border:.5px solid #e0e0e0;';
  document.body.style.overflow='hidden';
  setTimeout(()=>document.addEventListener('click',timeOut),10);
}

function applyTime(){
  if(timePopupIdx==null)return;
  const h=getDrumValue(document.getElementById('tpHourDrum'));
  const m=getDrumValue(document.getElementById('tpMinDrum'));
  const parsed=h*60+m;
  const evs=getEvents();
  if(tpFixed){
    evs[timePopupIdx].fixedTime=fmtT(parsed);
  } else {
    evs[timePopupIdx].fixedTime=null;
    const times=computeTimes(evs);
    if(timePopupIdx>0&&times[timePopupIdx-1]!=null){
      const nd=parsed-times[timePopupIdx-1];
      if(nd>=0) evs[timePopupIdx-1].dur=nd;
      // マイナスになる場合は何もしない（ユーザーが固定ボタンで明示的に固定すべき）
    }
    // 前の時刻が不明でも強制固定しない（fixedTime=nullのまま）
  }
  closeTimePopup();renderTimeline();saveToFirestore();
}
document.getElementById('tpFix').addEventListener('click',function(){tpFixed=!tpFixed;this.className='tp-fix'+(tpFixed?' on':'');});
document.getElementById('tpOk').addEventListener('click',applyTime);
function timeOut(e){if(!document.getElementById('timePopup').contains(e.target))closeTimePopup();}
function closeTimePopup(){document.getElementById('timePopup').style.display='none';timePopupIdx=null;document.removeEventListener('click',timeOut);document.body.style.overflow='';}

function toggleList(evs,idx,paneId){
  evs[idx].open=!evs[idx].open;
  const pid=paneId||'main';
  const cl=document.getElementById('cl-'+pid+'-'+idx);
  const btn=document.getElementById('lt-'+pid+'-'+idx);
  if(cl)cl.className='checklist'+(evs[idx].open?' open':'');
  if(btn){btn.className='list-toggle'+(evs[idx].open?' open':'');btn.textContent=evs[idx].open?'−':'≡';}
  saveToFirestore();
}
function renderChecklist(evs,evIdx,paneId){
  const pid=paneId||'main';
  const cl=document.getElementById('cl-'+pid+'-'+evIdx);if(!cl)return;
  const checks=evs[evIdx].checks;cl.innerHTML='';
  checks.forEach((c,ci)=>{
    const row=document.createElement('div');row.className='check-item';
    const box=document.createElement('div');box.className='check-box'+(c.done?' checked':'');
    box.textContent=c.done?'✓':'';
    box.addEventListener('click',()=>{c.done=!c.done;box.className='check-box'+(c.done?' checked':'');box.textContent=c.done?'✓':'';inp.className='check-text'+(c.done?' done':'');saveToFirestore();});
    const inp=document.createElement('input');inp.className='check-text'+(c.done?' done':'');inp.value=c.text;
    inp.addEventListener('input',function(){c.text=this.value;saveToFirestore();});
    const del=document.createElement('button');del.className='check-del';del.textContent='×';
    del.addEventListener('click',()=>{checks.splice(ci,1);renderChecklist(evs,evIdx);saveToFirestore();});
    row.appendChild(box);row.appendChild(inp);row.appendChild(del);cl.appendChild(row);
  });
  const ar=document.createElement('div');ar.className='add-check';
  const plus=document.createElement('span');plus.textContent='＋';plus.style.cssText='font-size:14px;color:#3b82f6;flex-shrink:0;font-family:"M PLUS Rounded 1c",sans-serif';
  const ai=document.createElement('input');ai.className='add-check-input';ai.placeholder='やることを追加';
  function commitAddCheck(){
    const val=ai.value.trim();
    if(!val)return;
    checks.push({text:val,done:false});
    ai.value='';
    renderChecklist(evs,evIdx);
    saveToFirestore();
    // フォーカスを新しい入力欄に戻す
    setTimeout(()=>{
      const inputs=cl.querySelectorAll('.add-check-input');
      if(inputs.length)inputs[inputs.length-1].focus();
    },30);
  }
  ai.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commitAddCheck();}});
  // blurで追加はフォーカス移動で誤爆するので削除→Enterのみにする
  ar.appendChild(plus);ar.appendChild(ai);cl.appendChild(ar);
}

function renderTimeline(){
  const tl=document.getElementById('timelineArea');
  tl.innerHTML='';
  renderTimelineInto(tl, getEvents(), curDay);
  // トラック位置をリセット（スライドアニメ完了後）
  setTrackX(0,false);
  // 隣接ペインをサイレント更新
  const panePrev=document.getElementById('panePrev');
  const paneNext=document.getElementById('paneNext');
  if(panePrev) renderPaneContent(panePrev, curDay-1);
  if(paneNext){
    const overlay=document.getElementById('createOverlay');
    if(curDay < days.length-1){
      renderPaneContent(paneNext, curDay+1);
    } else {
      paneNext.innerHTML='';
      if(overlay){ paneNext.appendChild(overlay); overlay.style.opacity='0'; overlay.style.minHeight='200px'; }
    }
  }
}

function renderTimelineInto(tl, evs, dayIdx){
  const isMainPane = (tl === document.getElementById('timelineArea'));
  const paneId = isMainPane ? 'main' : ('p'+dayIdx); // ユニークなIDプレフィックス
  if(!days.length){
    if(isMainPane) tl.innerHTML='<div class="empty-hint"><div class="big">—</div>上の「日程を追加」から始めましょう</div>';
    if(isMainPane) setupDragDrop();return;
  }
  if(!evs.length){
    const hint=document.createElement('div');
    hint.className='empty-hint';
    hint.innerHTML='<div class="big">＋</div>この余白を長押しして<br>最初のイベントを追加';
    hint.style.cursor='pointer';
    if(isMainPane){
      let lpT=null;
      hint.addEventListener('touchstart',()=>{lpT=setTimeout(()=>{getEvents().push(mkEvent('新しいイベント',null,60));renderTimeline();saveToFirestore();},500);},{passive:true});
      hint.addEventListener('touchend',()=>clearTimeout(lpT));
      hint.addEventListener('mousedown',()=>{lpT=setTimeout(()=>{getEvents().push(mkEvent('新しいイベント',null,60));renderTimeline();saveToFirestore();},500);});
      hint.addEventListener('mouseup',()=>clearTimeout(lpT));
    }
    tl.appendChild(hint);
    if(isMainPane) setupDragDrop();return;
  }

  const times=computeTimes(evs);
  const allDurs=evs.slice(0,-1).map(e=>e.dur??0);
  const maxDV=Math.max(...allDurs.filter(d=>d>0),60);

  function makeDZ(ins){const dz=document.createElement('div');dz.className='drop-zone';dz.dataset.insert=ins;return dz;}

  evs.forEach((e,i)=>{
    const isLast=i===evs.length-1;
    const tStr=fmtT(times[i]);
    const isFixed=!!e.fixedTime;

    tl.appendChild(makeDZ(i));

    const wrap=document.createElement('div');wrap.className='ev-wrap';wrap.style.position='relative';
    const row=document.createElement('div');row.className='ev-row';

    const left=document.createElement('div');left.className='ev-left';
    const timeEl=document.createElement('div');
    timeEl.className='ev-time'+(isFixed?' fixed':'');timeEl.textContent=tStr;
    timeEl.addEventListener('click',ev=>{ev.stopPropagation();openTimePopup(i,timeEl);});
    left.appendChild(timeEl);

    const right=document.createElement('div');right.className='ev-right';
    const card=document.createElement('div');card.className='ev-card';
    const handle=document.createElement('div');handle.className='drag-handle';handle.textContent='⠿';

    const nameIn=document.createElement('input');nameIn.className='ev-name';nameIn.placeholder='イベント名';nameIn.value=e.name;
    nameIn.dataset.evIdx=i; nameIn.dataset.role='name'; nameIn.dataset.dayIdx=dayIdx;
    nameIn.addEventListener('input',function(){evs[i].name=this.value;saveToFirestore();});
    nameIn.addEventListener('mousedown',ev=>ev.stopPropagation());
    nameIn.addEventListener('touchstart',ev=>ev.stopPropagation(),{passive:true});

    // listBtn と delBtn を状態で切り替え
    const listBtn=document.createElement('button');listBtn.id='lt-'+paneId+'-'+i;
    listBtn.className='list-toggle'+(e.open?' open':'');listBtn.textContent=e.open?'−':'≡';
    listBtn.addEventListener('mousedown',ev=>ev.stopPropagation());
    listBtn.addEventListener('touchstart',ev=>ev.stopPropagation(),{passive:true});
    listBtn.addEventListener('click',ev=>{ev.stopPropagation();if(!wrap.classList.contains('jiggle'))toggleList(evs,i,paneId);});

    const delBtn=document.createElement('button');delBtn.className='ev-del-btn';delBtn.textContent='✕';
    delBtn.style.display='none';
    delBtn.addEventListener('mousedown',ev=>ev.stopPropagation());
    delBtn.addEventListener('touchstart',ev=>ev.stopPropagation(),{passive:true});
    delBtn.addEventListener('click',ev=>{
      ev.stopPropagation();
      exitJiggle();
      days[curDay].events.splice(i,1);
      renderTimeline();saveToFirestore();
    });

    card.appendChild(handle);card.appendChild(nameIn);card.appendChild(listBtn);card.appendChild(delBtn);
    right.appendChild(card);

    // jiggle状態の切り替え関数
    wrap._enterJiggle=()=>{
      wrap.classList.add('jiggle');
      listBtn.style.display='none';
      delBtn.style.display='flex';
      if(navigator.vibrate)navigator.vibrate([30,20,60]);
    };
    wrap._exitJiggle=()=>{
      wrap.classList.remove('jiggle');
      listBtn.style.display='flex';
      delBtn.style.display='none';
    };

    const cl=document.createElement('div');cl.id='cl-'+paneId+'-'+i;cl.className='checklist'+(e.open?' open':'');
    right.appendChild(cl);
    row.appendChild(left);row.appendChild(right);
    wrap.appendChild(row);
    tl.appendChild(wrap);
    if(isMainPane) renderChecklist(evs,i,paneId);

    if(!isLast){
      const dur=e.dur??0;
      const barH=Math.max(20,Math.round((dur/maxDV)*80));
      const conn=document.createElement('div');conn.className='connector';conn.style.minHeight=(barH+28)+'px';
      const cL=document.createElement('div');cL.className='conn-left';
      const bc=document.createElement('div');bc.className='conn-bar-col';bc.style.height='100%';
      const bar=document.createElement('div');bar.className='conn-bar';
      bc.appendChild(bar);cL.appendChild(bc);
      const cR=document.createElement('div');cR.className='conn-right';
      const btn=document.createElement('button');
      // 警告判定：次の固定時刻との間で所要時間がオーバーしているか
      let isWarn=false;
      if(times[i]!=null&&evs[i+1]&&evs[i+1].fixedTime){
        const nextFixed=parseT(evs[i+1].fixedTime);
        if(nextFixed!=null&&times[i]+dur>nextFixed) isWarn=true;
      } else if(times[i]!=null&&times[i+1]!=null&&evs[i+1].fixedTime){
        if(times[i]+dur>times[i+1]) isWarn=true;
      }
      // 固定時刻間で按分計算と実際の所要時間がずれている場合も警告
      if(!isWarn&&times[i]!=null&&times[i+1]!=null){
        const expected=times[i+1]-times[i];
        if(dur>expected+1) isWarn=true;
      }
      btn.className='dur-btn'+(e.durLocked?' locked':'')+(isWarn?' warn':'');
      btn.innerHTML=`<span style="font-size:10px;opacity:.7">▼</span>${e.durLocked?'<span style="font-size:10px;margin-right:1px">🔒</span>':''}<span>${e.dur!=null?e.dur:'?'}分</span>${isWarn?'<span style="font-size:10px;margin-left:2px">⚠️</span>':''}`;
      btn.addEventListener('click',ev=>{ev.stopPropagation();openDurPicker(i,btn);});

      // ＋ボタン（長押し後出現、ドラッグして挿入）
      const addBtn=document.createElement('button');
      addBtn.className='conn-add-btn';
      addBtn.textContent='＋';
      addBtn.dataset.insertIdx=String(i+1);
      cR.appendChild(btn);cR.appendChild(addBtn);
      conn.appendChild(cL);conn.appendChild(cR);tl.appendChild(conn);
    }
  });

  tl.appendChild(makeDZ(evs.length));
  if(isMainPane) setupDragDrop();
}

document.getElementById('tripName').addEventListener('input', saveToFirestore);

// iOSの長押しメニューを入力欄以外で完全無効化
document.addEventListener('contextmenu',e=>{
  if(!e.target.closest('input,textarea')) e.preventDefault();
});

// ── プルトゥリフレッシュ ─────────────────────────────────
(function(){
  const PTR_SHOW=60;    // この距離でインジケーター表示
  const PTR_COMMIT=160; // この距離で確定（約5cm）
  const ind=document.getElementById('ptr-indicator');
  let ptStartY=null,ptStartX=null,ptActive=false,ptLocked=false;

  document.addEventListener('touchstart',e=>{
    // ピッカーやポップアップが開いていたら無視
    if(document.getElementById('durPicker').style.display==='block') return;
    if(document.getElementById('timePopup').style.display==='block') return;
    if(window.scrollY>5) return;
    ptStartY=e.touches[0].clientY;
    ptStartX=e.touches[0].clientX;
    ptActive=false;
    ptLocked=false;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(ptStartY==null||window.scrollY>2) return;
    const dy=e.touches[0].clientY-ptStartY;
    const dx=Math.abs(e.touches[0].clientX-ptStartX);
    // 横方向の動きが大きければ水平スワイプなので無視
    if(!ptLocked && dx>dy*0.6) { ptStartY=null; return; }
    if(dy<PTR_SHOW) return;
    ptLocked=true;
    ptActive=true;
    if(dy>PTR_COMMIT){
      ind.textContent='↻ 離してリロード';ind.className='ready';
    } else {
      ind.textContent='↓ もっと引っ張る';ind.className='pulling';
    }
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!ptActive){ptStartY=null;ptStartX=null;ind.className='';return;}
    const dy=e.changedTouches[0].clientY-ptStartY;
    ptStartY=null;ptStartX=null;ptActive=false;ptLocked=false;
    if(dy>PTR_COMMIT){
      ind.textContent='↻ リロード中…';ind.className='ready';
      setTimeout(()=>location.reload(),400);
    } else {
      ind.className='';
    }
  },{passive:true});
})();
</script>
