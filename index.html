<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#F5C842;
  min-height:100vh;
  touch-action:pan-y;
}

/* 背景ドットパターン */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(0,0,0,.07) 1.5px,transparent 1.5px);
  background-size:20px 20px;
  pointer-events:none;
  z-index:0;
}

.app{max-width:100%;margin:0 auto;padding:0 0 120px;position:relative;z-index:1}

/* ── ヘッダー ── */
.app-head{
  background:linear-gradient(150deg,#1d6e6a 0%,#2E7D78 55%,#1a5c58 100%);
  padding:14px 14px 16px;
  border-radius:0 0 26px 26px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(20,80,76,.35),0 1px 0 rgba(255,255,255,.08) inset;
  overflow:hidden;
  /* transitions for compact mode */
  transition:padding .28s cubic-bezier(.4,0,.2,1),border-radius .25s ease;
}

/* ── コンパクトモード（スクロール後） ── */
.app-head.compact{padding:6px 14px 8px;border-radius:0 0 18px 18px}

.collapsible{
  overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1), opacity .22s ease, margin .22s ease;
}
.trip-name-row.collapsible{max-height:60px;opacity:1;margin-bottom:10px}
.app-head.compact .trip-name-row.collapsible{max-height:0;opacity:0;margin-bottom:0}

.date-label-wrap.collapsible{max-height:24px;opacity:1}
.app-head.compact .date-label-wrap.collapsible{max-height:0;opacity:0}

.date-dots-wrap.collapsible{max-height:30px;opacity:1;margin-top:8px}
.app-head.compact .date-dots-wrap.collapsible{max-height:0;opacity:0;margin-top:0}

.add-day-wrap.collapsible{max-height:38px;opacity:1;margin-top:6px}
.app-head.compact .add-day-wrap.collapsible{max-height:0;opacity:0;margin-top:0}

/* 旅行名 */
.trip-name-row{display:flex;align-items:center;justify-content:center}
.trip-name{
  font-size:17px;font-weight:900;
  color:#F5C842;
  background:transparent;border:none;outline:none;
  text-align:center;
  font-family:'M PLUS Rounded 1c',sans-serif;
  width:220px;
  letter-spacing:.04em;
  text-shadow:0 2px 6px rgba(0,0,0,.18);
}
.trip-name::placeholder{color:rgba(245,200,66,.4)}

/* 日付ナビ行 */
.date-nav{display:flex;align-items:center;gap:4px}
.nav-btn{
  width:38px;height:38px;
  border:none;background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.88);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:background .15s,transform .1s;
  touch-action:manipulation;flex-shrink:0;
}
.nav-btn:active{background:rgba(255,255,255,.22);transform:scale(.9)}

.date-center{flex:1;text-align:center;min-width:0}
.date-display{font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.day-label{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;font-family:'M PLUS Rounded 1c',sans-serif}

/* ＋ボタン（追加） */
.hdr-add-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(245,200,66,.18);
  border:1.5px solid rgba(245,200,66,.5);
  color:#F5C842;
  font-size:22px;font-weight:300;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  touch-action:none;
  transition:background .15s,transform .1s,box-shadow .15s;
  user-select:none;
}
.hdr-add-btn:active{background:rgba(245,200,66,.32);transform:scale(.88)}
.hdr-add-btn.dragging-src{background:rgba(245,200,66,.35);box-shadow:0 0 0 3px rgba(245,200,66,.4)}

/* ゴミ箱 */
.hdr-trash{
  width:38px;height:38px;border-radius:50%;
  background:rgba(192,57,43,.14);
  border:1.5px dashed rgba(220,100,80,.55);
  color:rgba(240,150,130,.9);
  font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .18s;
}
.hdr-trash.over{background:rgba(192,57,43,.32);border-style:solid;border-color:rgba(220,80,60,.9);color:#fff;transform:scale(1.08)}

/* ドット */
.date-dots-wrap{display:flex;justify-content:center}
.date-dots{display:flex;justify-content:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.28);transition:all .2s;cursor:pointer}
.dot.active{background:#F5C842;transform:scale(1.5);box-shadow:0 0 0 3px rgba(245,200,66,.22)}
.dot.has-event{background:rgba(255,255,255,.6)}

/* 日程追加ボタン */
.add-day-wrap{display:flex;justify-content:center}
.add-day-row{display:flex;align-items:center;gap:8px;width:100%;justify-content:center}
.add-day-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,.22);
  border-radius:20px;padding:4px 16px;
  font-size:11px;color:rgba(255,255,255,.62);
  cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;
  touch-action:manipulation;
}
.add-day-btn:active{background:rgba(255,255,255,.1)}

/* ── タイムライン ── */
.timeline-area{padding:12px 12px 4px;overflow-x:hidden;width:100%}
.empty-hint{text-align:center;padding:48px 20px;color:#7a6010;font-size:14px;font-family:'M PLUS Rounded 1c',sans-serif;line-height:1.8}
.empty-hint .big{font-size:36px;margin-bottom:10px;letter-spacing:-.02em;color:#b08800;font-weight:900}

/* ドロップゾーン */
.drop-zone{height:4px;border-radius:4px;transition:all .15s;margin:0 52px}
.drop-zone.over{height:30px;background:rgba(46,125,120,.18);margin:2px 52px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.drop-zone.over::after{content:'ここに追加';font-size:10px;color:#2E7D78;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif}

/* ── イベント ── */
.ev-wrap{position:relative}
.ev-wrap.dragging{opacity:.32}
.ev-row{display:flex;align-items:flex-start}
.ev-left{width:58px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;padding-right:8px;padding-top:10px}
.ev-time{
  font-size:12px;font-weight:700;
  color:#1a5c58;
  cursor:pointer;
  padding:3px 5px;border-radius:6px;
  line-height:1;white-space:nowrap;
  transition:background .15s;
  font-family:'M PLUS Rounded 1c',sans-serif;
  text-shadow:0 1px 0 rgba(255,255,255,.55);
}
.ev-time:active{background:rgba(255,255,255,.65)}
.ev-time.fixed{color:#c0392b;background:rgba(192,57,43,.12);text-shadow:none}
.ev-right{flex:1;min-width:0;overflow:visible}

/* ── 雲形カード ── */
.ev-card{
  background:#fff;
  /* Base cloud shape */
  border-radius:26px 30px 24px 28px / 28px 26px 30px 24px;
  padding:10px 10px 10px 8px;
  display:flex;align-items:center;gap:6px;min-height:44px;
  box-shadow:
    0 3px 10px rgba(0,0,0,.09),
    0 1px 3px rgba(0,0,0,.05),
    inset 0 1px 2px rgba(255,255,255,.9);
  transition:box-shadow .2s;
  position:relative;
}
/* 4種のバリエーション */
.ev-wrap:nth-child(4n+1) .ev-card{border-radius:30px 22px 32px 24px / 24px 32px 20px 30px}
.ev-wrap:nth-child(4n+2) .ev-card{border-radius:22px 32px 26px 30px / 30px 22px 32px 24px}
.ev-wrap:nth-child(4n+3) .ev-card{border-radius:28px 24px 30px 20px / 20px 30px 24px 28px}
.ev-wrap:nth-child(4n+0) .ev-card{border-radius:24px 28px 22px 32px / 32px 20px 28px 22px}

.drag-handle{font-size:13px;color:#c8c8c8;cursor:grab;line-height:1;flex-shrink:0;padding:4px 2px;touch-action:none}
.drag-handle:active{cursor:grabbing}
.ev-name{font-size:14px;font-weight:500;color:#1a1a1a;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif;min-width:0}
.ev-name::placeholder{color:#ccc;font-weight:400}
.list-toggle{width:26px;height:26px;border-radius:50%;border:none;background:rgba(46,125,120,.1);color:#2E7D78;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;font-weight:700;transition:all .15s}
.list-toggle.open{background:#2E7D78;color:#fff}

/* チェックリスト */
.checklist{background:rgba(255,255,255,.72);border-radius:0 0 20px 22px;margin-top:-5px;padding:6px 10px 8px;display:none}
.checklist.open{display:block;background:linear-gradient(160deg,#dbeafe 0%,#bfdbfe 100%);border-top:1.5px solid rgba(147,197,253,.45)}
.check-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid rgba(147,197,253,.35)}
.check-item:last-of-type{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:7px;border:1.5px solid #93c5fd;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;font-size:13px}
.check-box.checked{background:#3b82f6;border-color:#3b82f6;color:#fff}
.check-text{font-size:13px;color:#1a1a1a;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif}
.check-text.done{text-decoration:line-through;color:#999}
.check-del{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#93c5fd;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.add-check{display:flex;align-items:center;gap:8px;padding:6px 0;margin-top:2px}
.add-check-input{font-size:13px;color:#666;background:transparent;border:none;outline:none;flex:1;font-family:'M PLUS Rounded 1c',sans-serif}
.add-check-input::placeholder{color:#93c5fd}

/* ── 線路コネクター ── */
.connector{display:flex;align-items:stretch}
.conn-left{width:58px;flex-shrink:0;display:flex;justify-content:flex-end;padding-right:8px}
.conn-bar-col{
  position:relative;
  width:20px;height:100%;
  display:flex;flex-direction:column;align-items:stretch;
}
/* 左右のレール */
.conn-bar-col::before,.conn-bar-col::after{
  content:'';
  position:absolute;top:0;bottom:0;
  width:2.5px;
  background:linear-gradient(to bottom,rgba(46,125,120,.7) 0%,rgba(46,125,120,.18) 100%);
  border-radius:2px;
  z-index:1;
}
.conn-bar-col::before{left:2px}
.conn-bar-col::after{right:2px}
/* 枕木 */
.conn-bar{
  flex:1;
  width:100%;
  min-height:8px;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 7px,
    rgba(46,125,120,.26) 7px, rgba(46,125,120,.26) 10px
  );
}
.conn-right{flex:1;display:flex;align-items:center;justify-content:center}
.dur-btn{
  display:flex;align-items:center;gap:4px;cursor:pointer;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(46,125,120,.1);
  border:1px solid rgba(46,125,120,.18);
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;font-weight:500;color:#2E7D78;
  touch-action:manipulation;
}
.dur-btn:active{background:rgba(46,125,120,.22)}

/* ── ピッカー ── */
.dur-picker{position:fixed;z-index:900;background:#fff;border-top:.5px solid #e0e0e0;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);width:100%;left:0;right:0;bottom:0;overflow:hidden;display:none}
.dur-inner{height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.dur-inner::-webkit-scrollbar{display:none}
.dur-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;scroll-snap-align:center;cursor:pointer;color:#1a1a1a;touch-action:manipulation;font-family:'M PLUS Rounded 1c',sans-serif}
.dur-item.sel{color:#2E7D78}
.dur-hl{position:absolute;left:0;right:0;top:90px;height:40px;border-top:1.5px solid #2E7D78;border-bottom:1.5px solid #2E7D78;pointer-events:none}

/* ── 時刻ポップアップ ── */
.time-popup{position:fixed;z-index:950;background:#fff;border:.5px solid #e0e0e0;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:20px 20px 36px;width:100%;display:none}
.tp-drum{overflow-y:scroll;height:160px;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tp-drum::-webkit-scrollbar{display:none}
.tp-drum-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;scroll-snap-align:center;cursor:pointer;color:#1a1a1a;font-family:'M PLUS Rounded 1c',sans-serif;user-select:none}
.tp-drum-item.sel{color:#2E7D78;font-weight:700}
.tp-drum-pad{height:60px;flex-shrink:0}
.tp-hl{position:absolute;left:0;right:0;top:60px;height:40px;border-top:1.5px solid #2E7D78;border-bottom:1.5px solid #2E7D78;pointer-events:none}
.tp-fix{padding:8px 14px;border-radius:10px;border:.5px solid #e0e0e0;background:transparent;font-size:12px;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;color:#1a1a1a}
.tp-fix.on{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.4);color:#c0392b;font-weight:700}
.tp-ok{padding:8px 20px;border-radius:10px;border:none;background:#2E7D78;color:#fff;font-size:12px;font-family:'M PLUS Rounded 1c',sans-serif;cursor:pointer;font-weight:700}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="app-head" id="appHead">
    <div class="trip-name-row collapsible">
      <input class="trip-name" id="tripName" value="旅のしおり" placeholder="旅行名">
    </div>
    <div class="date-nav">
      <button class="nav-btn" id="prevDay">‹</button>
      <div class="date-center">
        <div class="date-display" id="dateDisplay">—</div>
      </div>
      <button class="nav-btn" id="nextDay">›</button>
      <button class="hdr-add-btn" id="addBtn" title="イベント追加">+</button>
      <div class="hdr-trash" id="trash">×</div>
    </div>
    <div class="date-dots-wrap collapsible">
      <div class="date-dots" id="dateDots"></div>
    </div>
    <div class="add-day-wrap collapsible">
      <button class="add-day-btn" id="addDayBtn">＋ 日程を追加</button>
    </div>
  </div>

  <div class="timeline-area" id="timelineArea"></div>
</div>

<div class="dur-picker" id="durPicker">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:.5px solid #f0f0f0">
    <span style="font-size:13px;font-weight:700;color:#888;font-family:'M PLUS Rounded 1c',sans-serif">所要時間</span>
    <button onclick="document.getElementById('durPicker').style.display='none'" style="border:none;background:rgba(0,0,0,.06);border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;color:#666">×</button>
  </div>
  <div style="position:relative">
    <div class="dur-inner" id="durInner"></div>
    <div class="dur-hl"></div>
  </div>
</div>
<div class="time-popup" id="timePopup">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="tp-fix" id="tpFix">固定</button>
    <span style="font-size:13px;font-weight:700;color:#888;font-family:'M PLUS Rounded 1c',sans-serif">時刻を選択</span>
    <button class="tp-ok" id="tpOk">OK</button>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:8px;position:relative">
    <div style="position:relative;width:80px;height:160px;overflow:hidden">
      <div class="tp-drum" id="tpHourDrum"></div>
      <div class="tp-hl"></div>
    </div>
    <span style="font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:2px">:</span>
    <div style="position:relative;width:80px;height:160px;overflow:hidden">
      <div class="tp-drum" id="tpMinDrum"></div>
      <div class="tp-hl"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMQAwcnkgQcwQl1gDiuMRqybw0zNFjVMw",
  authDomain: "travel-app-1c301.firebaseapp.com",
  projectId: "travel-app-1c301",
  storageBucket: "travel-app-1c301.firebasestorage.app",
  messagingSenderId: "410781369240",
  appId: "1:410781369240:web:279933e3693841ae40a1ed"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLのハッシュを旅程IDとして使う（なければ新規作成）
let tripId = location.hash.slice(1);
if (!tripId) {
  tripId = crypto.randomUUID();
  location.hash = tripId;
}

let isSyncing = false; // リモート更新中はsaveしない

const STEP=5,MAX_DUR=300;
let nextId=100;
let days=[];
let curDay=0;
let dragSrc=null;
let durPickerIdx=null,timePopupIdx=null,tpFixed=false;

function mkEvent(name,fixedTime,dur){return{id:nextId++,name,fixedTime,dur,checks:[],open:false};}

// Firestoreへの保存（500ms debounce）
let saveTimer = null;
function saveToFirestore() {
  if (isSyncing) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(doc(db, "trips", tripId), { days, tripName: document.getElementById('tripName').value });
    } catch(e) { console.error('save error', e); }
  }, 500);
}

// Firestoreからリアルタイム受信
onSnapshot(doc(db, "trips", tripId), (snap) => {
  if (snap.exists()) {
    isSyncing = true;
    const data = snap.data();
    days = data.days || [];
    if (data.tripName) document.getElementById('tripName').value = data.tripName;
    // nextIdの衝突を防ぐ
    days.forEach(d => d.events.forEach(e => { if (e.id >= nextId) nextId = e.id + 1; }));
    curDay = Math.min(curDay, Math.max(0, days.length - 1));
    renderHeader();
    renderTimeline();
    isSyncing = false;
  } else {
    // 初回：デフォルトデータを作成して保存
    days=[{
      date:'10/10',
      events:[
        mkEvent('玉名出発','07:00',70),
        mkEvent('駐車場',null,70),
        mkEvent('空港・ラウンジ休憩',null,35),
        mkEvent('飛行機チェックイン',null,60),
        mkEvent('熊本発','06:35',105),
        mkEvent('羽田着',null,35),
        mkEvent('電車移動',null,0),
        mkEvent('ホテル着',null,null),
      ]
    }];
    saveToFirestore();
  }
});

function getEvents(){return days[curDay]?days[curDay].events:[];}
function parseT(s){if(!s||!s.includes(':'))return null;const[h,m]=s.split(':').map(Number);return isNaN(h)||isNaN(m)?null:h*60+m}
function fmtT(m){if(m==null||isNaN(m))return'--:--';const h=Math.floor(m/60)%24,mm=m%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}

function computeTimes(evs){
  const n=evs.length,times=new Array(n).fill(null);
  // まず固定時刻を埋める
  for(let i=0;i<n;i++)if(evs[i].fixedTime)times[i]=parseT(evs[i].fixedTime);
  // 前→後ろ方向に順算
  let cur=null;
  for(let i=0;i<n;i++){
    if(evs[i].fixedTime){cur=parseT(evs[i].fixedTime);times[i]=cur;}
    else if(cur!==null&&i>0){const d=evs[i-1].dur;if(d!=null&&!isNaN(d)){cur=cur+d;times[i]=cur;}else cur=null;}
  }
  // 後ろ→前方向に逆算（固定時刻より前のイベントを埋める）
  for(let i=n-1;i>=0;i--){
    if(times[i]!=null){
      // iより前でtimes[j]がnullのものを逆算
      let base=times[i];
      for(let j=i-1;j>=0;j--){
        if(times[j]!=null) break; // すでに確定済みなら止まる
        const dur=evs[j].dur;
        if(dur!=null&&!isNaN(dur)){base=base-dur;times[j]=base;}
        else break;
      }
    }
  }
  return times;
}

function maxDurFor(idx,times,evs){
  for(let j=idx+1;j<evs.length;j++){
    if(evs[j].fixedTime){
      const a=parseT(evs[j].fixedTime);
      if(a!=null&&times[idx]!=null){let o=0;for(let k=idx+1;k<j-1;k++)o+=(evs[k].dur||0);return Math.max(0,Math.floor((a-times[idx]-o)/STEP)*STEP);}
    }
  }
  return MAX_DUR;
}

function goDay(d){curDay=Math.max(0,Math.min(days.length-1,d));renderHeader();renderTimeline();}
document.getElementById('prevDay').addEventListener('click',()=>goDay(curDay-1));
document.getElementById('nextDay').addEventListener('click',()=>goDay(curDay+1));

document.getElementById('addDayBtn').addEventListener('click',()=>{
  const last=days[days.length-1];
  let newDate='';
  if(last&&last.date){
    const parts=last.date.split('/');
    if(parts.length===2){
      const year=new Date().getFullYear();
      const dt=new Date(year,parseInt(parts[0])-1,parseInt(parts[1])+1);
      newDate=`${dt.getMonth()+1}/${dt.getDate()}`;
    }
  }
  days.push({date:newDate,events:[]});
  curDay=days.length-1;
  renderHeader();renderTimeline();
});

function renderHeader(){
  const d=days[curDay];
  const disp=document.getElementById('dateDisplay');
  const prev=document.getElementById('prevDay');
  const next=document.getElementById('nextDay');
  if(!d){disp.textContent='—';}
  else{
    disp.innerHTML='';
    // カレンダー選択式inputに変更
    const inp=document.createElement('input');
    inp.type='date';
    // 既存の日付文字列をdate型に変換（M/D → YYYY-MM-DD）
    if(d.date&&d.date.includes('/')){
      const parts=d.date.split('/');
      const year=new Date().getFullYear();
      inp.value=`${year}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;
    } else if(d.date){
      inp.value=d.date;
    }
    inp.style.cssText='background:transparent;border:none;outline:none;text-align:center;font-family:"M PLUS Rounded 1c",sans-serif;font-size:17px;font-weight:700;color:#fff;width:160px;color-scheme:dark;';
    inp.addEventListener('change',function(){
      // YYYY-MM-DD → M/D 形式で保存
      if(this.value){
        const [y,m,dd]=this.value.split('-');
        days[curDay].date=`${parseInt(m)}/${parseInt(dd)}`;
      }
      renderDots();saveToFirestore();
    });
    disp.appendChild(inp);
  }
  prev.style.opacity=curDay<=0?.3:1;
  next.style.opacity=curDay>=days.length-1?.3:1;
  renderDots();
}

function renderDots(){
  const dots=document.getElementById('dateDots');dots.innerHTML='';
  days.forEach((d,i)=>{
    const dot=document.createElement('div');
    dot.className='dot'+(i===curDay?' active':d.events.length?' has-event':'');
    dot.addEventListener('click',()=>goDay(i));
    dots.appendChild(dot);
  });
}

/* スクロールでヘッダー折りたたみ */
window.addEventListener('scroll',()=>{
  document.getElementById('appHead').classList.toggle('compact',window.scrollY>28);
},{passive:true});

/* ── ドラッグ&ドロップ ── */
let touchDragData=null;
let touchClone=null;

function setupDragDrop(){
  const addBtn=document.getElementById('addBtn');
  const trash=document.getElementById('trash');

  /* ＋ボタン：デスクトップ drag */
  let addDragged=false;
  addBtn.draggable=true;
  addBtn.addEventListener('dragstart',e=>{
    addDragged=true;
    dragSrc='palette';
    e.dataTransfer.effectAllowed='copy';
    e.dataTransfer.setData('text/plain','palette');
    addBtn.classList.add('dragging-src');
  });
  addBtn.addEventListener('dragend',()=>{addDragged=false;dragSrc=null;addBtn.classList.remove('dragging-src');cleanDZ();});
  /* ＋ボタン：デスクトップ クリック → 末尾に追加 */
  addBtn.addEventListener('click',()=>{
    if(!addDragged&&days.length>0){
      getEvents().push(mkEvent('新しいイベント',null,60));
      renderTimeline();
      setTimeout(()=>{const ns=document.querySelectorAll('.ev-name');if(ns.length)ns[ns.length-1].focus();},50);
    }
  });
  /* ＋ボタン：タッチ drag開始 */
  addBtn.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    touchDragData={src:'palette',startX:t.clientX,startY:t.clientY};
    createTouchClone('新イベント',t.clientX,t.clientY);
  },{passive:true});

  /* ゴミ箱 */
  trash.addEventListener('dragover',e=>{e.preventDefault();trash.classList.add('over');});
  trash.addEventListener('dragleave',()=>trash.classList.remove('over'));
  trash.addEventListener('drop',e=>{
    e.preventDefault();trash.classList.remove('over');
    if(typeof dragSrc==='number'&&getEvents().length>1){getEvents().splice(dragSrc,1);dragSrc=null;renderTimeline();}
  });
  trash.addEventListener('touchstart',()=>trash.classList.add('over'),{passive:true});
  trash.addEventListener('touchend',()=>trash.classList.remove('over'));

  /* イベントカード */
  document.querySelectorAll('.ev-wrap').forEach((el,i)=>{
    el.draggable=true;
    el.addEventListener('dragstart',e=>{
      if(e.target.closest('.ev-name,.list-toggle,.check-box,.check-text,.add-check-input,.ev-time,.dur-btn'))return e.preventDefault();
      dragSrc=i;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(i));
      setTimeout(()=>el.classList.add('dragging'),0);
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');dragSrc=null;cleanDZ();});
  });

  document.querySelectorAll('.drag-handle').forEach((handle,i)=>{
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      const t=e.touches[0];
      touchDragData={src:i,startX:t.clientX,startY:t.clientY};
      createTouchClone(getEvents()[i]?.name||'イベント',t.clientX,t.clientY);
    },{passive:true});
  });

  document.querySelectorAll('.drop-zone').forEach(dz=>{
    dz.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect=dragSrc==='palette'?'copy':'move';cleanDZ();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();handleDrop(parseInt(dz.dataset.insert));});
  });
}

function createTouchClone(text,x,y){
  removeTouchClone();
  touchClone=document.createElement('div');
  touchClone.textContent=text;
  touchClone.style.cssText=`position:fixed;left:${x-60}px;top:${y-20}px;width:120px;background:#2E7D78;color:#fff;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;text-align:center;pointer-events:none;z-index:9999;opacity:.88;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:'M PLUS Rounded 1c',sans-serif`;
  document.body.appendChild(touchClone);
}
function removeTouchClone(){if(touchClone){touchClone.remove();touchClone=null;}}

document.addEventListener('touchmove',e=>{
  if(!touchDragData)return;
  const t=e.touches[0];
  if(touchClone){touchClone.style.left=(t.clientX-60)+'px';touchClone.style.top=(t.clientY-20)+'px';}
  cleanDZ();
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){
    const dz=el.closest('.drop-zone');if(dz)dz.classList.add('over');
    const tr=el.closest('#trash');if(tr)tr.classList.add('over');
  }
},{passive:true});

document.addEventListener('touchend',e=>{
  if(!touchDragData){removeTouchClone();return;}
  removeTouchClone();
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  let dropped=false;
  if(el){
    const dz=el.closest('.drop-zone');
    if(dz){handleDrop(parseInt(dz.dataset.insert),touchDragData.src);dropped=true;}
    const tr=el.closest('#trash');
    if(tr&&typeof touchDragData.src==='number'&&getEvents().length>1){getEvents().splice(touchDragData.src,1);renderTimeline();dropped=true;}
  }
  /* タップ判定：palette & ほぼ動いていない → 末尾に追加 */
  if(!dropped&&touchDragData.src==='palette'){
    const dx=t.clientX-touchDragData.startX;
    const dy=t.clientY-touchDragData.startY;
    if(Math.abs(dx)<12&&Math.abs(dy)<12&&days.length>0){
      getEvents().push(mkEvent('新しいイベント',null,60));
      renderTimeline();
      setTimeout(()=>{const ns=document.querySelectorAll('.ev-name');if(ns.length)ns[ns.length-1].focus();},50);
    }
  }
  cleanDZ();
  touchDragData=null;
});

function handleDrop(ins,src){
  const s=src!==undefined?src:dragSrc;
  const evs=getEvents();
  if(s==='palette'){
    evs.splice(ins,0,mkEvent('新しいイベント',null,60));
    dragSrc=null;renderTimeline();
    setTimeout(()=>{const ns=document.querySelectorAll('.ev-name');if(ns[ins]){ns[ins].focus();ns[ins].select();}},50);
  } else if(typeof s==='number'&&s!==ins&&s!==ins-1){
    const moved=evs.splice(s,1)[0];
    const ni=ins>s?ins-1:ins;
    evs.splice(ni,0,moved);
    dragSrc=null;renderTimeline();
  } else{dragSrc=null;renderTimeline();}
}

function cleanDZ(){
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('over'));
  const t=document.getElementById('trash');if(t)t.classList.remove('over');
}

function openDurPicker(idx,el){
  if(durPickerIdx===idx){closeDurPicker();return;}
  closeTimePopup();durPickerIdx=idx;
  const evs=getEvents(),times=computeTimes(evs);
  const maxD=maxDurFor(idx,times,evs),cur=evs[idx].dur??0;
  const inner=document.getElementById('durInner');inner.innerHTML='';
  const opts=[];for(let v=0;v<=Math.min(maxD,MAX_DUR);v+=STEP)opts.push(v);
  opts.forEach(v=>{
    const d=document.createElement('div');d.className='dur-item'+(v===cur?' sel':'');d.textContent=v+'分';
    d.addEventListener('click',()=>{evs[idx].dur=v;closeDurPicker();renderTimeline();});
    inner.appendChild(d);
  });
  const p=document.getElementById('durPicker');
  p.style.cssText='display:block;position:fixed;bottom:0;left:0;right:0;width:100%;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);z-index:900;background:#fff;border-top:.5px solid #e0e0e0;overflow:hidden;';
  const si=opts.indexOf(cur);if(si>=0)inner.scrollTop=si*40-90;
  setTimeout(()=>document.addEventListener('click',durOut),10);
}
function durOut(e){if(!document.getElementById('durPicker').contains(e.target))closeDurPicker();}
function closeDurPicker(){document.getElementById('durPicker').style.display='none';durPickerIdx=null;document.removeEventListener('click',durOut);}

function buildDrum(drumEl, items, selectedVal) {
  drumEl.innerHTML = '';
  const padT = document.createElement('div'); padT.className = 'tp-drum-pad'; drumEl.appendChild(padT);
  items.forEach(v => {
    const d = document.createElement('div');
    d.className = 'tp-drum-item' + (v === selectedVal ? ' sel' : '');
    d.textContent = String(v).padStart(2, '0');
    drumEl.appendChild(d);
  });
  const padB = document.createElement('div'); padB.className = 'tp-drum-pad'; drumEl.appendChild(padB);
  const idx = items.indexOf(selectedVal);
  if (idx >= 0) drumEl.scrollTop = idx * 40;
}

function getDrumValue(drumEl) {
  const idx = Math.round(drumEl.scrollTop / 40);
  const items = Array.from(drumEl.querySelectorAll('.tp-drum-item'));
  return items[idx] ? parseInt(items[idx].textContent) : 0;
}

const HOURS = Array.from({length:24},(_,i)=>i);
const MINS  = Array.from({length:12},(_,i)=>i*5); // 0,5,10,...,55

function openTimePopup(idx,el){
  if(timePopupIdx===idx){closeTimePopup();return;}
  closeDurPicker();timePopupIdx=idx;
  const evs=getEvents(),times=computeTimes(evs);
  const t=times[idx]??540; // デフォルト9:00
  tpFixed=!!evs[idx].fixedTime;
  const h=Math.floor(t/60)%24;
  const m=Math.round((t%60)/5)*5%60;
  buildDrum(document.getElementById('tpHourDrum'), HOURS, h);
  buildDrum(document.getElementById('tpMinDrum'),  MINS,  m);
  document.getElementById('tpFix').className='tp-fix'+(tpFixed?' on':'');
  const p=document.getElementById('timePopup');
  p.style.cssText='display:block;position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);padding:20px 20px 36px;z-index:950;background:#fff;border:.5px solid #e0e0e0;';
  setTimeout(()=>document.addEventListener('click',timeOut),10);
}

function applyTime(){
  if(timePopupIdx==null)return;
  const h=getDrumValue(document.getElementById('tpHourDrum'));
  const m=getDrumValue(document.getElementById('tpMinDrum'));
  const parsed=h*60+m;
  const evs=getEvents();
  if(tpFixed){evs[timePopupIdx].fixedTime=fmtT(parsed);}
  else{
    evs[timePopupIdx].fixedTime=null;
    const times=computeTimes(evs);
    if(timePopupIdx>0&&times[timePopupIdx-1]!=null){const nd=parsed-times[timePopupIdx-1];if(nd>=0)evs[timePopupIdx-1].dur=nd;}
  }
  closeTimePopup();renderTimeline();
}
document.getElementById('tpFix').addEventListener('click',function(){tpFixed=!tpFixed;this.className='tp-fix'+(tpFixed?' on':'');});
document.getElementById('tpOk').addEventListener('click',applyTime);
function timeOut(e){if(!document.getElementById('timePopup').contains(e.target))closeTimePopup();}
function closeTimePopup(){document.getElementById('timePopup').style.display='none';timePopupIdx=null;document.removeEventListener('click',timeOut);}

function toggleList(evs,idx){
  evs[idx].open=!evs[idx].open;
  const cl=document.getElementById('cl-'+idx);
  const btn=document.getElementById('lt-'+idx);
  if(cl)cl.className='checklist'+(evs[idx].open?' open':'');
  if(btn){btn.className='list-toggle'+(evs[idx].open?' open':'');btn.textContent=evs[idx].open?'−':'≡';}
}
function renderChecklist(evs,evIdx){
  const cl=document.getElementById('cl-'+evIdx);if(!cl)return;
  const checks=evs[evIdx].checks;cl.innerHTML='';
  checks.forEach((c,ci)=>{
    const row=document.createElement('div');row.className='check-item';
    const box=document.createElement('div');box.className='check-box'+(c.done?' checked':'');
    box.textContent=c.done?'✓':'';
    box.addEventListener('click',()=>{c.done=!c.done;box.className='check-box'+(c.done?' checked':'');box.textContent=c.done?'✓':'';inp.className='check-text'+(c.done?' done':'');saveToFirestore();});
    const inp=document.createElement('input');inp.className='check-text'+(c.done?' done':'');inp.value=c.text;
    inp.addEventListener('input',function(){c.text=this.value;saveToFirestore();});
    const del=document.createElement('button');del.className='check-del';del.textContent='×';
    del.addEventListener('click',()=>{checks.splice(ci,1);renderChecklist(evs,evIdx);});
    row.appendChild(box);row.appendChild(inp);row.appendChild(del);cl.appendChild(row);
  });
  const ar=document.createElement('div');ar.className='add-check';
  const plus=document.createElement('span');plus.textContent='＋';plus.style.cssText='font-size:14px;color:#3b82f6;flex-shrink:0;font-family:"M PLUS Rounded 1c",sans-serif';
  const ai=document.createElement('input');ai.className='add-check-input';ai.placeholder='やることを追加';
  ai.addEventListener('keydown',e=>{if(e.key==='Enter'&&ai.value.trim()){checks.push({text:ai.value.trim(),done:false});ai.value='';renderChecklist(evs,evIdx);}});
  ai.addEventListener('blur',()=>{if(ai.value.trim()){checks.push({text:ai.value.trim(),done:false});ai.value='';renderChecklist(evs,evIdx);}});
  ar.appendChild(plus);ar.appendChild(ai);cl.appendChild(ar);
}

function renderTimeline(){
  const tl=document.getElementById('timelineArea');
  tl.innerHTML='';
  const evs=getEvents();
  if(!days.length){
    tl.innerHTML='<div class="empty-hint"><div class="big">—</div>上の「日程を追加」から始めましょう</div>';
    setupDragDrop();return;
  }
  if(!evs.length){
    tl.innerHTML='<div class="empty-hint"><div class="big">+</div>右上の ＋ をタップ or ドラッグして<br>イベントを追加しましょう</div>';
    setupDragDrop();return;
  }

  const times=computeTimes(evs);
  const allDurs=evs.slice(0,-1).map(e=>e.dur??0);
  const maxDV=Math.max(...allDurs.filter(d=>d>0),60);

  function makeDZ(ins){const dz=document.createElement('div');dz.className='drop-zone';dz.dataset.insert=ins;return dz;}

  evs.forEach((e,i)=>{
    const isLast=i===evs.length-1;
    const tStr=fmtT(times[i]);
    const isFixed=!!e.fixedTime;

    tl.appendChild(makeDZ(i));

    const wrap=document.createElement('div');wrap.className='ev-wrap';
    const row=document.createElement('div');row.className='ev-row';

    const left=document.createElement('div');left.className='ev-left';
    const timeEl=document.createElement('div');
    timeEl.className='ev-time'+(isFixed?' fixed':'');timeEl.textContent=tStr;
    timeEl.addEventListener('click',ev=>{ev.stopPropagation();openTimePopup(i,timeEl);});
    left.appendChild(timeEl);

    const right=document.createElement('div');right.className='ev-right';
    const card=document.createElement('div');card.className='ev-card';
    const handle=document.createElement('div');handle.className='drag-handle';handle.textContent='⠿';
    const nameIn=document.createElement('input');nameIn.className='ev-name';nameIn.placeholder='イベント名';nameIn.value=e.name;
    nameIn.addEventListener('input',function(){evs[i].name=this.value;saveToFirestore();});
    nameIn.addEventListener('mousedown',ev=>ev.stopPropagation());
    const listBtn=document.createElement('button');listBtn.id='lt-'+i;
    listBtn.className='list-toggle'+(e.open?' open':'');listBtn.textContent=e.open?'−':'≡';
    listBtn.addEventListener('mousedown',ev=>ev.stopPropagation());
    listBtn.addEventListener('click',ev=>{ev.stopPropagation();toggleList(evs,i);});
    card.appendChild(handle);card.appendChild(nameIn);card.appendChild(listBtn);
    right.appendChild(card);

    const cl=document.createElement('div');cl.id='cl-'+i;cl.className='checklist'+(e.open?' open':'');
    right.appendChild(cl);
    row.appendChild(left);row.appendChild(right);
    wrap.appendChild(row);
    tl.appendChild(wrap);
    renderChecklist(evs,i);

    if(!isLast){
      const dur=e.dur??0;
      const barH=Math.max(20,Math.round((dur/maxDV)*80));
      const conn=document.createElement('div');conn.className='connector';conn.style.minHeight=(barH+28)+'px';
      const cL=document.createElement('div');cL.className='conn-left';
      const bc=document.createElement('div');bc.className='conn-bar-col';bc.style.height='100%';
      /* 線路：レールはCSS::before/::after、枕木はconn-bar */
      const bar=document.createElement('div');bar.className='conn-bar';
      bc.appendChild(bar);cL.appendChild(bc);
      const cR=document.createElement('div');cR.className='conn-right';
      const btn=document.createElement('button');btn.className='dur-btn';
      btn.innerHTML=`<span style="font-size:10px;opacity:.7">▼</span><span>${e.dur!=null?e.dur:'?'}分</span>`;
      btn.addEventListener('click',ev=>{ev.stopPropagation();openDurPicker(i,btn);});
      cR.appendChild(btn);conn.appendChild(cL);conn.appendChild(cR);tl.appendChild(conn);
    }
  });

  tl.appendChild(makeDZ(evs.length));
  setupDragDrop();
  saveToFirestore();
}

document.getElementById('tripName').addEventListener('input', saveToFirestore);
</script>
